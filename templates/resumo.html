<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <link rel="icon" href="{{ url_for('static', filename='imagens/logo.png') }}" type="image/png">
  <title>Planilha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* 🔥 ESPAÇO NO TOPO (EXATAMENTE O QUE VOCÊ MARCOU) */
    body {
      background: linear-gradient(135deg, #1f242b, #1b2027);
      color: #f8f9fa;
      padding-top: 120px; /* ← AQUI cria o espaço superior */
      min-height: 100vh;
    }

    /* mantém alinhamento igual ao sistema */
    .container-principal {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* título igual padrão do sistema */
    .titulo-sistema {
      text-align: center;
      color: #0d6efd;
      font-weight: bold;
      margin-bottom: 30px;
    }

    /* inputs visual dark */
    .form-control, .form-select {
      background-color: #e9ecef;
      border: none;
      border-radius: 8px;
    }

    /* tabela */
    table {
      background-color: transparent;
      color: #fff;
    }

    th, td {
      border-color: #6c757d !important;
      text-align: center;
    }

    /* botões navegação dia */
    .btn-dia {
      background-color: #6c757d;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
    }

    .btn-dia:hover {
      background-color: #5a6268;
    }

    /* 📱 Responsivo (celular) */
    @media (max-width: 768px) {
      body {
        padding-top: 60px; /* espaço menor no mobile */
      }
    }
  </style>
</head>

<body>

  <div class="container container-principal">

    <!-- ABAS (mesmo lugar do sistema) -->
    <ul class="nav nav-tabs mb-3">
      <li class="nav-item">
        <a class="nav-link {% if tipo == 'sig' %}active{% endif %}" href="/planilha-sig">Planilha SIG</a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if tipo == 'ssh' %}active{% endif %}" href="/planilha-ssh">Planilha SSH</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/resumo">Resumo P&R</a>
      </li>
    </ul>


        PLANILHA SIG
      {% else %}
        PLANILHA SSH
      {% endif %}
    </h2>
