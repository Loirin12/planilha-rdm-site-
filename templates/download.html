<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Multiplataforma</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {

    background: #020617;
    color: white;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

}

.card-box {

    background: #020617;

    border-radius: 20px;

    padding: 30px;

    width: 100%;

    max-width: 700px;

    box-shadow: 0 10px 25px rgba(0,0,0,0.5);

}

</style>

</head>

<body>

<div class="card-box">

<h3 class="text-center mb-4">

Download Multiplataforma

</h3>

<div class="mb-3">

<label>

Cole o link

</label>

<input

    id="url"

    class="form-control"

    placeholder="YouTube, TikTok, Instagram..."

>

</div>

<div class="mb-3">

<label>

Tipo

</label>

<select

    id="tipo"

    class="form-select"

>

<option value="video">

Vídeo MP4

</option>

<option value="audio">

Música MP3

</option>

</select>

</div>

<button

    class="btn btn-primary w-100"

    onclick="buscarVideo()"

>

Buscar

</button>


<div id="info" style="display:none; margin-top:20px;">

<h5 id="titulo"></h5>

<img

    id="thumbnail"

    width="100%"

    style="border-radius:10px;"

>

<br><br>

<button

    class="btn btn-success w-100"

    onclick="baixarVideo()"

>

Baixar

</button>

</div>

</div>

<script>

function buscarVideo() {

    const url = document.getElementById("url").value

    if (!url) {

        alert("Cole um link primeiro")

        return

    }

    fetch("/api/info", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            url: url
        })

    })

    .then(res => res.json())

    .then(dados => {

        if (dados.erro) {

            alert("Erro ao buscar vídeo")

            return

        }

        document.getElementById("titulo").innerText =
            dados.titulo

        document.getElementById("thumbnail").src =
            dados.thumbnail

        document.getElementById("info").style.display =
            "block"

    })

    .catch(err => {

        console.log(err)

        alert("Erro ao buscar vídeo")

    })

}



function baixarVideo() {

    const url = document.getElementById("url").value

    const tipo =
        document.getElementById("tipo").value

    if (!url) {

        alert("Cole um link primeiro")

        return

    }

    fetch("/api/download", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            url: url,
            tipo: tipo
        })

    })

    .then(res => {

        if (!res.ok) {

            alert("Erro ao baixar")

            return

        }

        return res.blob()

    })

    .then(blob => {

        if (!blob) return

        const link =
            document.createElement("a")

        link.href =
            window.URL.createObjectURL(blob)

        if (tipo === "audio") {

            link.download = "musica.mp3"

        }

        else {

            link.download = "video.mp4"

        }

        document.body.appendChild(link)

        link.click()

        document.body.removeChild(link)

        alert("Download iniciado!")

    })

    .catch(err => {

        console.error(err)

        alert("Falha no download")

    })

}

</script>

</body>
</html>
