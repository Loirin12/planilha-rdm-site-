<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Multiplataforma</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body {
    background: #020617;
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}
.card-box {
    background: #020617;
    border-radius: 20px;
    padding: 30px;
    width: 100%;
    max-width: 700px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="card-box">
<h3 class="text-center mb-4">Download Multiplataforma</h3>
<div class="mb-3">
<label>Cole o link</label>
<input id="url" class="form-control" placeholder="YouTube, TikTok, Instagram...">
</div>
<div class="mb-3">
<label>Tipo</label>
<select id="tipo" class="form-select">
<option value="video">Vídeo MP4</option>
<option value="audio">Música MP3</option>
</select>
</div>
<button class="btn btn-primary w-100" onclick="buscarVideo()">Buscar</button>

<div id="info" style="display:none; margin-top:20px;">
<h5 id="titulo"></h5>
<div style="color: #ccc; font-size: 0.9em;">
  <div>Duração: <span id="duracao"></span></div>
  <div id="tipo-info"></div>
  <div>Tamanho Vídeo: <span id="tamanho_video"></span></div>
  <div>Tamanho Áudio: <span id="tamanho_audio"></span></div>
</div>
<div class="progress mt-3" id="progress" style="display:none; height:6px;">
  <div class="progress-bar" id="progress-bar" role="progressbar" style="width:0%"></div>
</div>
<br>
<button class="btn btn-success w-100" id="btn-download" onclick="baixarVideo()">Baixar</button>
</div>
</div>
<script>
function buscarVideo() {
    const url = document.getElementById("url").value
    if (!url) {
        alert("Cole um link primeiro")
        return
    }

    fetch("/api/info", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url})
    })
    .then(res => res.json())
    .then(dados => {
        if (dados.erro) {
            alert("Erro: " + dados.erro)
            return
        }
        document.getElementById("titulo").innerText = dados.titulo || 'Erro ao carregar'
        document.getElementById("duracao").innerText = dados.duracao || ''
        document.getElementById("tamanho_video").innerText = dados.tamanho_video || ''
        document.getElementById("tamanho_audio").innerText = dados.tamanho_audio || ''
        document.getElementById("tipo-info").innerText = document.getElementById("tipo").value === 'video' ? 'Vídeo MP4' : 'Áudio MP3'
        document.getElementById("info").style.display = "block"
    })
    .catch(err => {
        console.log(err)
        alert("Erro ao buscar vídeo")
    })
}

function baixarVideo() {
    const url = document.getElementById("url").value
    const tipo = document.getElementById("tipo").value
    if (!url) {
        alert("Cole um link primeiro")
        return
    }

    const btn = document.getElementById("btn-download")
    const progress = document.getElementById("progress")
    const progressBar = document.getElementById("progress-bar")
    
    btn.innerText = tipo === 'audio' ? 'Baixando áudio...' : 'Baixando vídeo...'
    btn.disabled = true
    progress.style.display = 'block'
    progressBar.style.width = '0%'

    fetch("/api/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url, tipo: tipo})
    })
    .then(res => {
        if (!res.ok) {
            throw new Error('Download failed')
        }
        btn.innerText = 'Download concluído!'
        progressBar.style.width = '100%'
        setTimeout(() => {
            const blob = new Blob()
            const link = document.createElement("a")
            link.href = URL.createObjectURL(blob)
            link.download = tipo === 'audio' ? 'musica.mp3' : 'video.mp4'
            link.click()
        }, 1000)
    })
    .catch(err => {
        btn.innerText = 'Erro no download'
        btn.disabled = false
        progress.style.display = 'none'
        alert('Falha no download: ' + err.message)
    })
}
</script>
</body>
</html>
