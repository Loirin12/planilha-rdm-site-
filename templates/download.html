<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Download Multiplataforma</title>

<!-- Favicon (imagem do site na aba do navegador) -->
<link rel="icon" type="image/png" href="/static/logo.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body {

    background: linear-gradient(135deg, #020617, #0f172a);

    color: white;

    min-height: 100vh;

    display: flex;

    align-items: center;

    justify-content: center;

}

.card-box {

    background: #020617;

    border-radius: 20px;

    padding: 30px;

    width: 100%;

    max-width: 700px;

    box-shadow: 0 15px 35px rgba(0,0,0,0.6);

}

.progress {

    height: 25px;

}

footer {

    position: fixed;

    bottom: 10px;

    width: 100%;

    text-align: center;

    font-size: 14px;

    color: #94a3b8;

}

</style>

</head>

<body>

<div class="card-box">

<!-- LOGO DO SITE -->

<div style="text-align:center; margin-bottom:15px;">

<img

src="/static/logo.png"

alt="Logo do site"

style="
height: 80px;
object-fit: contain;
">

</div>

<h3 class="text-center mb-4">

Download Multiplataforma

</h3>

<div class="mb-3">

<label>
Cole o link
</label>

<input
id="url"
class="form-control"
placeholder="YouTube, TikTok, Instagram..."
>

</div>

<div class="mb-3">

<label>
Tipo
</label>

<select id="tipo" class="form-select">

<option value="video">
Vídeo MP4
</option>

<option value="audio">
Música MP3
</option>

</select>

</div>

<button
class="btn btn-primary w-100"
onclick="buscarVideo()"
>
Buscar
</button>

<div id="info" style="display:none; margin-top:20px;">

<h5 id="titulo"></h5>

<img
id="thumbnail"
width="100%"
style="border-radius:10px;"
>

<br><br>

<button
class="btn btn-success w-100"
onclick="baixarVideo()"
>
Baixar
</button>

<br><br>

<div id="progresso" style="display:none;">

<div class="progress">

<div
id="barra"
class="progress-bar progress-bar-striped progress-bar-animated"
style="width: 0%"
>
0%

</div>

</div>

<br>

<p id="tempo">
Tempo: 0s
</p>

<p id="velocidade">
Velocidade: 0 MB/s
</p>

</div>

</div>

</div>

<footer>
Desenvolvido por <strong>Rian</strong>
</footer>

<script>

let segundos = 0
let timer
let velocidadeTimer

function buscarVideo() {

    const url = document.getElementById("url").value

    fetch("/api/info", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({ url })

    })

    .then(res => res.json())

    .then(dados => {

        document.getElementById("titulo").innerText = dados.titulo

        document.getElementById("thumbnail").src = dados.thumbnail

        document.getElementById("info").style.display = "block"

    })

}

function baixarVideo() {

    const url = document.getElementById("url").value

    const tipo = document.getElementById("tipo").value

    document.getElementById("progresso").style.display = "block"

    iniciarTempo()

    iniciarVelocidade()

    animarBarra()

    fetch("/api/download", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({ url, tipo })

    })

    .then(res => res.blob())

    .then(blob => {

        pararTempo()

        pararVelocidade()

        document.getElementById("barra").style.width = "100%"

        document.getElementById("barra").innerText = "100%"

        const link = document.createElement("a")

        link.href = window.URL.createObjectURL(blob)

        link.download = tipo === "audio"
            ? "musica.mp3"
            : "video.mp4"

        document.body.appendChild(link)

        link.click()

        document.body.removeChild(link)

    })

}

function animarBarra() {

    let progresso = 0

    const barra = document.getElementById("barra")

    const intervalo = setInterval(() => {

        if (progresso >= 95) {
            clearInterval(intervalo)
        }

        progresso += 5

        barra.style.width = progresso + "%"

        barra.innerText = progresso + "%"

    }, 500)

}

function iniciarTempo() {

    segundos = 0

    timer = setInterval(() => {

        segundos++

        document.getElementById("tempo").innerText =
            "Tempo: " + segundos + "s"

    }, 1000)

}

function pararTempo() {

    clearInterval(timer)

}

function iniciarVelocidade() {

    velocidadeTimer = setInterval(() => {

        let velocidade = (
            Math.random() * 2 + 1
        ).toFixed(2)

        document.getElementById("velocidade").innerText =
            "Velocidade: " +
            velocidade +
            " MB/s"

    }, 1000)

}

function pararVelocidade() {

    clearInterval(velocidadeTimer)

}

</script>

</body>
</html>
